name: ユーザー作業依頼
description: エージェントが作業中にユーザーの操作が必要と判断した項目
labels: ["needs-user-action"]
body:
  - type: input
    id: agent
    attributes:
      label: 発見元エージェント
      placeholder: "coder / reviewer / qa"
    validations:
      required: true
  - type: input
    id: task
    attributes:
      label: 作業内容
      description: 発見時に取り組んでいたタスクの概要
    validations:
      required: true
  - type: input
    id: pr
    attributes:
      label: 関連 PR
      placeholder: "#番号"
  - type: textarea
    id: description
    attributes:
      label: 必要な作業
      description: ユーザーに実施してほしい作業の内容
    validations:
      required: true
