pre-commit:
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: bunx oxfmt --write {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: bunx oxlint --config .oxlintrc.json {staged_files}
    terraform-fmt:
      glob: "*.tf"
      run: terraform fmt -recursive infra/
      stage_fixed: true
